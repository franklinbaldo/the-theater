name: Heartbeat

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:
    inputs:
      round_number:
        description: 'Round number (leave blank for auto)'
        required: false
      force_new:
        description: 'Force new sessions for all actors'
        type: boolean
        default: false

concurrency:
  group: heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main
        run: git pull origin main --ff-only

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Auto-merge ready PRs (fails CI if any PR is stuck)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Pre-heartbeat auto-merge ==="
          PRS=$(gh pr list --base main --state open --json number,title --limit 100 2>/dev/null || echo "[]")
          COUNT=$(echo "$PRS" | jq length)

          if [ "$COUNT" -eq 0 ]; then
            echo "No open PRs."
            exit 0
          fi

          STUCK=""
          MERGED=0

          for NUM in $(echo "$PRS" | jq -r '.[].number'); do
            TITLE=$(echo "$PRS" | jq -r ".[] | select(.number==$NUM) | .title")
            DETAIL=$(gh pr view "$NUM" --json mergeable,statusCheckRollup 2>/dev/null || echo "{}")
            MERGEABLE=$(echo "$DETAIL" | jq -r '.mergeable // "UNKNOWN"')

            # Conflicting PRs are stuck — fail CI
            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "::error::PR #$NUM has conflicts: $TITLE"
              STUCK="$STUCK #$NUM"
              continue
            fi

            [ "$MERGEABLE" != "MERGEABLE" ] && continue

            CHECKS=$(echo "$DETAIL" | jq '(.statusCheckRollup // [])')
            PENDING=$(echo "$CHECKS" | jq '[.[] | select(.status != "COMPLETED")] | length')
            [ "$PENDING" -gt 0 ] && echo "  #$NUM pending checks" && continue

            FAILED=$(echo "$CHECKS" | jq '[.[] | select(.status == "COMPLETED" and .conclusion != "SUCCESS" and .conclusion != "SKIPPED" and .conclusion != "NEUTRAL")] | length')
            if [ "$FAILED" -gt 0 ]; then
              echo "::error::PR #$NUM has failing checks: $TITLE"
              STUCK="$STUCK #$NUM"
              continue
            fi

            if gh pr merge "$NUM" --merge 2>/dev/null; then
              echo "  Merged #$NUM: $TITLE"
              MERGED=$((MERGED + 1))
            else
              echo "::error::PR #$NUM merge command failed: $TITLE"
              STUCK="$STUCK #$NUM"
            fi
          done

          echo ""
          echo "$MERGED PR(s) merged."

          if [ -n "$STUCK" ]; then
            echo "::error::Stuck PRs that need attention:$STUCK"
            exit 1
          fi

      - name: Pull main after merges
        run: git pull origin main --ff-only

      - name: Override round number (if manually specified)
        if: ${{ github.event.inputs.round_number != '' }}
        run: |
          python -c "
          import json
          data = {'round': int('${{ github.event.inputs.round_number }}'),
                  'updated': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
                  'note': 'Manually overridden via workflow_dispatch.'}
          with open('backstage/stage-manager/round.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f'Round number overridden to {data[\"round\"]}')
          "

      - name: Run heartbeat
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODE=${{ github.event.inputs.force_new == 'true' && 'force-new' || 'heartbeat' }}
          python tools/heartbeat.py "$MODE"

      - name: Commit and push
        run: |
          git config user.name "stage-manager[bot]"
          git config user.email "stage-manager@the-theater"
          ROUND=$(python -c "import json; print(json.load(open('backstage/stage-manager/round.json'))['round'])")
          git add backstage/
          git diff --cached --quiet || git commit -m "heartbeat: round $ROUND"
          git push
