name: Merge Check

on:
  pull_request:
    branches: [main]

jobs:
  merge-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check merge compatibility
        run: |
          git fetch origin main
          if ! git merge --no-commit --no-ff origin/main 2>/dev/null; then
            echo "::error::This PR has merge conflicts with main. Fix with: git fetch origin main && git merge origin/main"
            git merge --abort
            exit 1
          fi
          git merge --abort 2>/dev/null || true
          echo "Merge check passed — no conflicts."
