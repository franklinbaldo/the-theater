name: Deploy Blog to Pages

on:
  push:
    branches: [main]
    paths:
      - 'blog/**'
      - 'sessions/**'
      - 'backstage/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Copy content into blog collections
        run: |
          mkdir -p blog/src/content/posts
          mkdir -p blog/src/content/backstage

          # Copy sessions into posts collection
          for f in sessions/*.md; do
            [ -f "$f" ] && cp "$f" blog/src/content/posts/
          done

          # Copy backstage content (scenes, notes, logs, hobbies) into backstage collection
          # Prefix with actor name to avoid filename collisions
          # Only copy files that have valid frontmatter (start with ---)
          for dir in scenes notes logs hobbies; do
            find backstage -path "*/$dir/*.md" | while read f; do
              first=$(head -1 "$f")
              if [ "$first" = "---" ]; then
                actor=$(echo "$f" | cut -d'/' -f2)
                base=$(basename "$f")
                cp "$f" "blog/src/content/backstage/${actor}_${base}"
              fi
            done
          done

          echo "Posts:" && ls blog/src/content/posts/
          echo "Backstage:" && ls blog/src/content/backstage/

      - name: Install dependencies
        working-directory: blog
        run: npm ci

      - name: Build Astro site
        working-directory: blog
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
